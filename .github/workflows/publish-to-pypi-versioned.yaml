name: Shared Pipeline to build and publish Python packages to Pypi
on:
  workflow_call:
    inputs:
      release_type:
        description: The type of version number to return. Must be one of [Patch, Minor or Major]
        required: true
        type: string
      vulnerability_failure_severity:
        description: The severity to fail the workflow if such vulnerability is detected. DO NOT override it unless a Jira ticket is raised. Must be one of ['CRITICAL', 'CRITICAL,HIGH' or 'CRITICAL,HIGH,MEDIUM'] (without space in between).
        type: string
        default: 'CRITICAL,HIGH'
      working_dir:
        description: The path to the directory for which the version should be determined.
        type: string
        default: '.'
      publish_vulnerabilities:
        type: string
        default: "true"

env:
  REPO: ${{ github.event.repository.name }}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      security-events: write
      packages: write
    steps:
      - name: Show Context
        run: |
          printenv
          echo "$GITHUB_CONTEXT"
        shell: bash
        env: 
            GITHUB_CONTEXT: ${{ toJson(github) }}
    
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # - name: Vulnerability Scan
      #   uses: IABTechLab/uid2-shared-actions/actions/vulnerability_scan@v3
      #   with:
      #     scan_severity: HIGH,CRITICAL
      #     failure_severity: ${{ inputs.vulnerability_failure_severity }}
      #     publish_vulnerabilities: ${{ inputs.publish_vulnerabilities }}
      #     scan_type: 'fs'

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep '^version' ${{ inputs.working_dir }}/pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set version number
        id: version
        uses: ./.github/actions/version_number
        with:
          release_type: ${{ inputs.release_type }}
          current_version: ${{ steps.current_version.outputs.version }}

      - name: Update pyproject.toml
        run: |
          sed -i "s/version = \"${{ steps.current_version.outputs.version }}\"/version = \"${{ steps.version.outputs.new_version }}\"/" ${{ inputs.working_dir }}/pyproject.toml

      - name: Build
        run: |
          python3 -m pip install --upgrade build
          python3 -m build

      - name: Publish
        run: |
          python3 -m pip install --upgrade twine
          python3 -m pip install --upgrade packaging
          python3 -m twine upload dist/* -u __token__ -p "${{ secrets.PYPI_API_KEY }}"

      - name: Commit pyproject.toml and set tag
        uses: ./.github/actions/commit_pr_and_merge
        with:
          add: '${{ inputs.working_dir }}/pyproject.toml'
          message: 'Released ${{ inputs.release_type }} version: ${{ steps.version.outputs.new_version }}'
          tag: v${{ steps.version.outputs.new_version }}          

      - name: Build Changelog
        id: github_release
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          toTag: v${{ steps.version.outputs.new_version }}
          configurationJson: |
            {
                "template": "#{{CHANGELOG}}\n## Pypi\n```\n<dependency>\n    <groupId>com.uid2</groupId>\n    <artifactId>${{ env.REPO }}</artifactId>\n    <version>${{ steps.version.outputs.new_version }}</version>\n</dependency>\n```\n\n## Pypi Files\n- [uid2_client-${{ steps.version.outputs.new_version }}.tar.gz](https://pypi.org/project/uid2-client/)\n\n## Changelog\n#{{UNCATEGORIZED}}",
                "pr_template": " - #{{TITLE}} - ( PR: ##{{NUMBER}} )"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.new_version }}
          body: ${{ steps.github_release.outputs.changelog }}
          draft: true