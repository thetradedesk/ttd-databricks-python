name: Bug Report
description: Report a bug in the ttd-databricks SDK
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: sdk-version
    attributes:
      label: ttd-databricks Version
      description: "Output of `pip show ttd-databricks`"
      placeholder: "e.g. 0.3.1"
    validations:
      required: true

  - type: input
    id: ttd-data-version
    attributes:
      label: ttd-data Version
      description: "Output of `pip show ttd-data`"
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: dropdown
    id: endpoint
    attributes:
      label: TTD Endpoint
      description: Which endpoint were you using?
      options:
        - /data/advertiser (First-Party Data)
        - /data/thirdparty (Third-Party Data)
        - /providerapi/offlineconversion (Offline Conversion)
        - /data/deletion-optout/advertiser
        - /data/deletion-optout/thirdparty
        - /data/deletion-optout/merchant
        - Not applicable
    validations:
      required: true

  - type: dropdown
    id: processing-mode
    attributes:
      label: Processing Mode
      options:
        - Ad Hoc (push_data)
        - Batch (batch_process)
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Databricks runtime version, Python version, cluster type
      placeholder: |
        - Databricks Runtime: 14.3 LTS
        - Python: 3.10
        - Cluster: Standard_DS3_v2, 4 workers
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: Did this work before?
      options:
        - "Yes, it was previously working"
        - "No, this never worked"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      placeholder: "A clear and concise description of what went wrong. Please include any configs used if applicable (e.g. parallelism, batch_size)."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: Minimal code snippet or steps to trigger the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened. Include the full traceback if applicable.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      placeholder: Any other context — screenshots, logs, related issues, workarounds tried.
    validations:
      required: false
